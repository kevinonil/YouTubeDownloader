name: 🎯 Universal Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Download mode (single / playlist / channel / search)'
        required: true
        default: 'single'
      url:
        description: 'Video URL, playlist URL, channel URL, or search query'
        required: true
      type:
        description: 'Output type (video / audio)'
        required: true
        default: 'video'
      quality:
        description: 'Quality (for video: 144/360/480/720/1080/highest, for audio: 64/128/192/320)'
        required: false
        default: '720'
      max_videos:
        description: 'Max videos for playlist/channel/search mode'
        required: false
        default: '10'
      split_threshold_mb:
        description: 'Split large files into zip parts over this size (MB, 0 = no split)'
        required: false
        default: '0'

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests
          sudo apt-get update && sudo apt-get install -y zip unzip ffmpeg

      - name: Download and process
        shell: python
        run: |
          import os, sys, json, re, subprocess, time, glob, shutil
          from pathlib import Path
          import yt_dlp
          from urllib.parse import urlparse, parse_qs

          # ---------- Inputs ----------
          mode = "${{ github.event.inputs.mode }}"
          url = "${{ github.event.inputs.url }}".strip()
          out_type = "${{ github.event.inputs.type }}"
          quality = "${{ github.event.inputs.quality }}"
          max_videos = int("${{ github.event.inputs.max_videos }}")
          split_mb = int("${{ github.event.inputs.split_threshold_mb }}")

          # ---------- Helpers ----------
          def safe_name(s):
              return re.sub(r'[\\/*?:"<>|]', '_', s)[:200]

          def format_views(n):
              if n is None:
                  return "N/A"
              if n >= 1_000_000:
                  return f"{n/1_000_000:.1f}M"
              if n >= 1_000:
                  return f"{n/1_000:.0f}K"
              return str(n)

          def get_video_info(video_url):
              with yt_dlp.YoutubeDL({'quiet': True, 'no_warnings': True}) as ydl:
                  try:
                      info = ydl.extract_info(video_url, download=False)
                      return info
                  except Exception as e:
                      print(f"Error getting info for {video_url}: {e}")
                      return None

          def get_channel_from_url(channel_url):
              try:
                  with yt_dlp.YoutubeDL({'quiet': True, 'no_warnings': True}) as ydl:
                      info = ydl.extract_info(channel_url, download=False)
                      return info.get('channel', info.get('uploader', 'Unknown'))
              except:
                  return 'Unknown'

          def get_channel_from_playlist(playlist_url):
              try:
                  with yt_dlp.YoutubeDL({'quiet': True, 'no_warnings': True, 'extract_flat': True}) as ydl:
                      info = ydl.extract_info(playlist_url, download=False)
                      uploader = info.get('channel', info.get('uploader', info.get('title', 'Unknown')))
                      return uploader
              except:
                  return 'Unknown'

          def get_video_list(target_url, mode_, max_vids):
              """Returns list of (title, url) for playlist/channel/search."""
              results = []
              try:
                  if mode_ == 'search':
                      # yt-dlp search: prefix "ytsearchN:" where N is number of results
                      search_url = f"ytsearch{max_vids}:{target_url}"
                      with yt_dlp.YoutubeDL({'quiet': True, 'no_warnings': True, 'extract_flat': True}) as ydl:
                          info = ydl.extract_info(search_url, download=False)
                          for entry in info.get('entries', []):
                              if entry:
                                  results.append((entry.get('title', 'No title'), entry.get('webpage_url', '')))
                  else:
                      # playlist or channel
                      with yt_dlp.YoutubeDL({'quiet': True, 'no_warnings': True, 'extract_flat': True}) as ydl:
                          info = ydl.extract_info(target_url, download=False)
                          for entry in info.get('entries', []):
                              if entry and len(results) < max_vids:
                                  results.append((entry.get('title', 'No title'), entry.get('webpage_url', '')))
              except Exception as e:
                  print(f"Error fetching list: {e}")
              return results

          def make_index(channel_name, items, base_path, out_type, quality):
              md_path = base_path / "index.md"
              with open(md_path, 'w', encoding='utf-8') as f:
                  f.write(f"# {channel_name}\n\n")
                  f.write(f"**Type:** {out_type} | **Quality:** {quality}\n\n")
                  f.write("| # | Title | Views | Duration |\n")
                  f.write("|---|---|---|---|\n")
                  for idx, (title, url) in enumerate(items, 1):
                      info = get_video_info(url)
                      views = format_views(info.get('view_count') if info else None)
                      duration = info.get('duration_string', 'N/A') if info else 'N/A'
                      safe = safe_name(title)
                      f.write(f"| {idx} | [{safe}]({url}) | {views} | {duration} |\n")
              print(f"Index file created: {md_path}")

          def download_single(video_url, dest_path, out_type, quality_spec):
              """Download one video/audio using yt-dlp."""
              os.makedirs(dest_path, exist_ok=True)
              ydl_opts = {
                  'outtmpl': str(dest_path / '%(title)s.%(ext)s'),
              }
              if out_type == 'video':
                  if quality_spec == 'highest':
                      ydl_opts['format'] = 'bestvideo+bestaudio/best'
                  else:
                      ydl_opts['format'] = f'bestvideo[height<={quality_spec}]+bestaudio/best[height<={quality_spec}]'
                  ydl_opts['merge_output_format'] = 'mp4'
              else:  # audio
                  ydl_opts['format'] = 'bestaudio/best'
                  ydl_opts['postprocessors'] = [{
                      'key': 'FFmpegExtractAudio',
                      'preferredcodec': 'mp3',
                      'preferredquality': quality_spec,  # e.g. '192'
                  }]
              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  ydl.download([video_url])

          def split_file(file_path, threshold_mb):
              """Split a file into zip parts if larger than threshold_mb MB."""
              if threshold_mb <= 0:
                  return
              file_path = Path(file_path)
              if not file_path.exists():
                  return
              size_mb = file_path.stat().st_size / (1024 * 1024)
              if size_mb <= threshold_mb:
                  return
              print(f"File is {size_mb:.1f} MB, splitting...")
              base = file_path.stem
              parent = file_path.parent
              os.chdir(parent)
              subprocess.run(['zip', '-s', f'{threshold_mb}m', f'{base}.zip', file_path.name], check=True)
              file_path.unlink()  # remove original after successful split

          # ---------- Main logic ----------
          if mode == 'search':
              # For search: just generate a result index file, do not download
              print(f"\n=== SEARCH MODE: {url} ===")
              items = get_video_list(url, 'search', max_videos)
              if not items:
                  print("No results found.")
                  sys.exit(0)
              search_dir = Path('searches')
              search_dir.mkdir(exist_ok=True)
              safe_query = safe_name(url)[:50]
              out_dir = search_dir / f"search_{safe_query}"
              os.makedirs(out_dir, exist_ok=True)
              make_index(f"Search: {url}", items, out_dir, out_type, quality)
              print(f"Search results saved to {out_dir}")

          elif mode in ('playlist', 'channel'):
              print(f"\n=== {mode.upper()} MODE: {url} ===")
              # Determine channel name
              if mode == 'channel':
                  channel_name = get_channel_from_url(url)
              else:
                  channel_name = get_channel_from_playlist(url)
              if not channel_name or channel_name == 'Unknown':
                  channel_name = 'unknown_channel'
              safe_channel = safe_name(channel_name)
              items = get_video_list(url, mode, max_videos)
              if not items:
                  print("No videos found.")
                  sys.exit(0)
              base_dir = Path('downloads') / f"{safe_channel}_videos"
              os.makedirs(base_dir, exist_ok=True)
              # Create index.md
              make_index(channel_name, items, base_dir, out_type, quality)
              # Download each video
              for idx, (title, vurl) in enumerate(items, 1):
                  print(f"\nDownloading [{idx}/{len(items)}]: {title}")
                  try:
                      download_single(vurl, base_dir, out_type, quality)
                  except Exception as e:
                      print(f"Failed: {e}")
                      continue
                  # Split if needed
                  for f in base_dir.iterdir():
                      if f.is_file() and not f.name.endswith('.md') and not f.name.endswith('.zip'):
                          split_file(f, split_mb)

          else:  # single mode
              print(f"\n=== SINGLE MODE: {url} ===")
              info = get_video_info(url)
              if info:
                  channel = info.get('channel', info.get('uploader', 'Unknown'))
                  safe_channel = safe_name(channel)
                  base_dir = Path('downloads') / f"{safe_channel}_videos"
                  os.makedirs(base_dir, exist_ok=True)
                  print(f"Downloading to {base_dir}")
                  download_single(url, base_dir, out_type, quality)
                  # Split if needed
                  for f in base_dir.iterdir():
                      if f.is_file() and not f.name.endswith('.md') and not f.name.endswith('.zip'):
                          split_file(f, split_mb)
              else:
                  print("Could not fetch video info. Aborting.")
                  sys.exit(1)

          print("\n=== DONE ===")

      - name: Push files to repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Add downloaded files [skip ci]"
          git push
